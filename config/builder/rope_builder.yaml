# ======================================= GS Optimization Config ======================================= #
# general
device:  "cuda:0"
near_plane: 0.01
far_plane: 3.0

# initialization
init_opacity: 0.1
num_pts: 80000
num_gaussians: 12000
disk: False   # if use disk Gaussians (False: ellipsoid Gaussians)

# optimization
batch_size: 4
ssim_lambda: 0.1
use_rgbd: True 
depth_lambda: 0.005  

# particle initialization
particle_max_iter: 1500
particle_collision_max_iter: 3
particle_batch: True  # if use batch optimization 
learning_rates_particles: {
  # "means": 1.0e-4,
  "means": 1.0e-5,
  "quats": 1.0e-3,
  "colors": 2.5e-3,
  "scales": 1.0e-3,
  "opacities": 1.0e-2,
}

# gaussian initialization
gaussian_max_iter: 2200
gaussian_batch: True  # if use batch optimization 
learning_rates_gaussians: {
  "means": 1.6e-5,
  "quats": 1.0e-3,
  "colors": 2.5e-3,
  "scales": 2.0e-3,
  "opacities": 5.0e-2,
}

# Strategy Config
refine_start_iter: 200
refine_stop_iter: 2100
refine_every: 100
reset_every: 500

prune_opa: 0.2
grow_scale3d: 0.02
